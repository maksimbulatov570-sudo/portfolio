<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Максим Булатов</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
:root{--bg:#0a0a0a;--white:#fff;--gray:rgba(255,255,255,.5);--font:'Helvetica Neue',Arial,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);cursor:none;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;transition:background .6s}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .8s}
#loading.done{opacity:0;pointer-events:none}
#loading img{height:30px;animation:lp 2s ease infinite}
#loading .bar{width:120px;height:2px;background:rgba(255,255,255,.1);overflow:hidden}
#loading .bar-fill{height:100%;background:#fff;width:0%;transition:width .3s}
@keyframes lp{0%,100%{opacity:.3}50%{opacity:1}}

/* CURSOR */
#cursor{position:fixed;z-index:100000;pointer-events:none;width:8px;height:8px;background:var(--white);border-radius:50%;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:difference}
#cursor.hover{width:48px;height:48px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3)}
#cursor.drag{width:14px;height:14px;background:var(--white)}
#clabel{position:fixed;z-index:100001;pointer-events:none;color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;transform:translate(16px,-50%);opacity:0;transition:opacity .2s;white-space:nowrap}
#clabel.on{opacity:1}

/* HEADER — gradient white→transparent, right to left */
header{
  position:fixed;top:0;right:0;
  z-index:10000;pointer-events:none;
  height:60px;width:auto;
  display:flex;align-items:center;
  padding:0 40px;
  background:linear-gradient(to left, rgba(255,255,255,1) 0%, rgba(255,255,255,0.95) 40%, rgba(255,255,255,0.6) 70%, transparent 100%);
}
.logo{
  position:fixed;top:0;left:0;
  height:60px;display:flex;align-items:center;
  padding:0 40px;
  pointer-events:auto;cursor:none;
  z-index:10001;
}
.logo img{height:22px;transition:opacity .3s}
.logo:hover img{opacity:.5}
.hnav{display:flex;gap:28px;pointer-events:auto}
.hnav a{color:#000;text-decoration:none;font-size:10px;font-weight:700;letter-spacing:1px;transition:opacity .3s;cursor:none}
.hnav a:hover{opacity:.4}

/* TABS — light pills centered */
.tabs{
  position:fixed;top:68px;left:50%;
  transform:translateX(-50%);
  z-index:9999;pointer-events:none;
  max-width:95vw;
}
.tabs-in{
  display:flex;gap:6px;padding:0;
  pointer-events:auto;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.tabs-in::-webkit-scrollbar{display:none}
.tb{
  background:rgba(255,255,255,.12);
  color:rgba(255,255,255,.6);
  border:none;padding:8px 20px;
  font-size:10px;font-weight:700;letter-spacing:.8px;
  cursor:none;white-space:nowrap;
  transition:all .4s;font-family:var(--font);
  border-radius:100px;
}
.tb:hover{color:#fff;background:rgba(255,255,255,.2)}
.tb.on{background:#fff;color:#000}

/* LIGHT MODE */
body.light-mode{background:#f0f0f0}
body.light-mode .tb{background:rgba(0,0,0,.07);color:rgba(0,0,0,.45)}
body.light-mode .tb:hover{color:#000;background:rgba(0,0,0,.12)}
body.light-mode .tb.on{background:#000;color:#fff}
body.light-mode .card{box-shadow:0 8px 30px rgba(0,0,0,.15)}
body.light-mode .card:hover{box-shadow:0 16px 50px rgba(0,0,0,.25)}
body.light-mode .card::after{border-color:rgba(0,0,0,.08)}
body.light-mode .card .tg{background:rgba(255,255,255,.9);color:#000}
body.light-mode .hints span{color:#000;background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.08)}
body.light-mode .foot a{color:rgba(0,0,0,.4)}
body.light-mode .foot a:hover{color:#000}
body.light-mode #cursor{background:#000}
body.light-mode #clabel{color:#000}

/* CANVAS */
#canvas{position:fixed;inset:0;overflow:hidden}
#world{position:absolute;inset:0;transform-origin:center center}

/* CARDS */
.card{
  position:absolute;cursor:none;
  box-shadow:0 8px 30px rgba(0,0,0,.7);
  overflow:hidden;background:#111;
  transition:box-shadow .3s;
  will-change:transform,left,top;
}
.card::after{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,.06);pointer-events:none}
.card:hover{box-shadow:0 16px 50px rgba(0,0,0,.9)}
.card:hover::after{border-color:rgba(255,255,255,.12)}
.card.dr{box-shadow:0 24px 80px rgba(0,0,0,1);transition:none}
.card img{width:100%;height:auto;display:block;pointer-events:none}
.card video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.card .tg{
  position:absolute;bottom:8px;left:8px;
  background:rgba(0,0,0,.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:#fff;font-size:8px;font-weight:700;letter-spacing:.8px;
  padding:4px 8px;opacity:0;transition:opacity .3s;
}
.card:hover .tg{opacity:1}

/* DETAIL */
#detail{position:fixed;inset:0;z-index:50000;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;cursor:none}
#detail.open{display:block}
#detail.dk{background:var(--bg);color:var(--white)}
#detail.lt{background:#f5f5f5;color:#000}
.dc{position:fixed;top:20px;right:24px;z-index:50002;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:300;cursor:none;transition:all .3s;border-radius:50%}
.dk .dc{color:#fff;background:rgba(255,255,255,.06)}
.dk .dc:hover{background:rgba(255,255,255,.12)}
.lt .dc{color:#000;background:rgba(0,0,0,.05)}
.lt .dc:hover{background:rgba(0,0,0,.1)}
.dhero{padding:100px 60px 50px;max-width:800px}
.dlogo{height:36px;margin-bottom:28px;display:block}
.dtitle{font-size:42px;font-weight:900;letter-spacing:-1px;line-height:1.05;margin-bottom:20px}
.ddesc{font-size:15px;line-height:1.7;max-width:550px}
.dk .ddesc{color:rgba(255,255,255,.6)}
.dk .ddesc strong{color:#fff}
.lt .ddesc{color:rgba(0,0,0,.55)}
.lt .ddesc strong{color:#000}
.dgal{padding:20px 60px 100px;columns:3;column-gap:16px}
.gi{break-inside:avoid;margin-bottom:16px;overflow:hidden;cursor:none}
.dk .gi{background:#111}
.lt .gi{background:#e0e0e0}
.gi img,.gi video{width:100%;display:block;transition:transform .4s ease}
.gi:hover img,.gi:hover video{transform:scale(1.03)}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:60000;display:none;align-items:center;justify-content:center;cursor:none}
#lightbox.open{display:flex}
#lightbox img,#lightbox video{max-width:92vw;max-height:92vh;object-fit:contain}
.lbc{position:absolute;top:20px;right:24px;color:#fff;font-size:20px;font-weight:300;cursor:none;pointer-events:auto;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.06);transition:background .3s}
.lbc:hover{background:rgba(255,255,255,.12)}

/* HINTS */
.hints{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10001;display:flex;gap:10px;pointer-events:none;opacity:0;animation:hi 1s ease 2s forwards}
@keyframes hi{to{opacity:.25}}
.hints span{color:#fff;font-size:9px;font-weight:600;letter-spacing:.5px;padding:4px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}

/* FOOTER */
.foot{position:fixed;bottom:24px;right:36px;z-index:10001;pointer-events:auto}
.foot a{color:var(--gray);text-decoration:none;font-size:10px;font-weight:700;letter-spacing:1px;cursor:none;transition:color .3s}
.foot a:hover{color:var(--white)}

/* RESPONSIVE */
@media(max-width:768px){
header{height:48px;padding:0 16px}
.logo{height:48px;padding:0 16px}
.logo img{height:16px}
.hnav{gap:12px}
.hnav a{font-size:8px;letter-spacing:.5px}
.tabs{top:54px}
.tb{font-size:9px;padding:6px 14px}
#cursor,#clabel{display:none!important}
body{cursor:auto}
.card{cursor:grab}.card:active{cursor:grabbing}
.card .tg{opacity:1;font-size:7px;padding:3px 6px}
.dhero{padding:80px 24px 30px}
.dtitle{font-size:28px}
.ddesc{font-size:13px}
.dgal{padding:10px 24px 60px;columns:2;column-gap:10px}
.gi{margin-bottom:10px}
.dc{top:12px;right:12px}
.hints{gap:6px;bottom:56px;flex-wrap:wrap;justify-content:center;width:88%}
.hints span{font-size:8px;padding:3px 8px}
.foot{bottom:16px;right:16px}
.foot a{font-size:9px}
}
@media(max-width:480px){
.hnav{gap:8px}
.hnav a{font-size:7px}
.dgal{columns:1}
}
</style>
</head>
<body>

<div id="loading">

<header>
<nav class="hnav">

</div>

</div>

</div>

</div><script>
var isMob = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;

var INFO = {
  ga:{title:'GOLD APPLE',theme:'dk',logo:'logos/ga-logo.png',desc:'<strong>Разработка Key Visual,</strong> ресайзы, перевод, подготовка к печати.<br><br>Совместный проект со Studio21. Обратились перед новым годом с очень сжатыми сроками. Успели доработать концепцию, собрать, сделать ресайзы и адаптировать под другой язык с соблюдением всех особенностей <strong>за 3 недели.</strong>',imgs:13,vids:[]},
  pan:{title:'PANAGERO',theme:'dk',logo:'logos/pan-logo.png',desc:'<strong>Разработал визуальный язык бренда,</strong> сделал новые шаблоны по которым было сверстано 130 единиц контента для соц сетей.<br><br>Также занимался разработкой креативов для рассылок email, визуалом сайта.<br><br>И генерацией AI креативов.',imgs:17,vids:['videos/video-02.mp4']},
  lp:{title:'LE PAPA',theme:'dk',logo:'logos/lp-logo.png',desc:'<strong>AI креативы для соц сетей.</strong><br><br>Генерация изображений, стилизация, финальная доработка.',imgs:4,vids:['videos/video-03.mp4']},
  treaf:{title:'TREAF',theme:'dk',logo:'logos/treaf-logo.png',desc:'<strong>Доработал визуальный язык бренда,</strong> помог пересобрать контент и адаптировал старые съемки под новый стиль.',imgs:4,vids:['videos/video-04.mp4']},
  cb:{title:'CUVEE BACCINI',theme:'dk',logo:'logos/cb-logo.png',desc:'<strong>Разработал логотип и этикетки</strong> ребятам из Шампани, Франция.<br>Бутылки уже стоят на полках в магазинах.',imgs:3,vids:[]},
  bp:{title:'BULATOV.POSTER',theme:'lt',logo:'logos/bp-logo.png',desc:'<strong>Авторский постерный проект.</strong><br><br>Визуальные эксперименты, типографика, коллажи.',imgs:12,vids:['videos/video-05.mp4']},
  endy:{title:'ENDY',theme:'dk',logo:'logos/endy-logo.png',desc:'Работал в <strong>4-ом в России брендинговом агентстве ENDY.</strong><br><br>NDA - показать все не могу, но умею работать в больших командах с серьезными клиентами.',imgs:11,vids:[]}
};

var KEYS = ['ga','pan','lp','treaf','cb','bp','endy'];

function ip(key,i){return 'img/'+key+'-'+(i<10?'0'+i:i)+'.jpg';}

var DATA = [];
KEYS.forEach(function(key){
  var info = INFO[key];
  for(var i=1;i<=info.imgs;i++){
    var big = (i===1);
    var w = big ? 260 : (130+Math.round(Math.random()*70));
    DATA.push({src:ip(key,i),type:'img',project:key,label:info.title,w:w,h:Math.round(w*1.3)});
  }
  info.vids.forEach(function(v){
    DATA.push({src:v,type:'video',project:key,label:info.title,w:170,h:300});
  });
});

var world = document.getElementById('world');
var canvas = document.getElementById('canvas');
var cur = document.getElementById('cursor');
var clabel = document.getElementById('clabel');
var detail = document.getElementById('detail');
var dHero = document.getElementById('dHero');
var dGal = document.getElementById('dGal');
var dCloseBtn = document.getElementById('dClose');
var lightbox = document.getElementById('lightbox');
var lbImg = document.getElementById('lbImg');
var lbCloseBtn = document.getElementById('lbClose');
var loadingEl = document.getElementById('loading');
var loadBar = document.getElementById('loadBar');

var cards = [];
var zTop = 100;
var zoom = 1;
var dragC = null;
var dragOff = {x:0,y:0};
var dragVel = {x:0,y:0};
var dragTime = 0;
var gravOn = false;
var actx = null;

function snd(){
  try{
    if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
    var b = actx.createBuffer(1,actx.sampleRate*0.05,actx.sampleRate);
    var d = b.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(actx.sampleRate*0.012));
    var s = actx.createBufferSource();s.buffer=b;
    var g = actx.createGain();g.gain.value=0.02;
    s.connect(g);g.connect(actx.destination);s.start();
  }catch(e){}
}

function build(){
  world.innerHTML='';
  cards=[];
  var W=window.innerWidth;
  var H=window.innerHeight;
  var pad=isMob?70:130;
  var sc=isMob?0.55:1;

  DATA.forEach(function(d,i){
    var el=document.createElement('div');
    el.className='card';
    el.setAttribute('data-project',d.project);
    el.setAttribute('data-idx',i);

    var w=Math.round(d.w*sc);
    var x=pad+Math.random()*Math.max(10,W-w-pad*2);
    var y=pad+Math.random()*Math.max(10,H-200-pad*2);
    var r=(Math.random()-0.5)*18;

    el.style.width=w+'px';
    el.style.left=x+'px';
    el.style.top=y+'px';
    el.style.transform='rotate('+r+'deg)';
    el.style.zIndex=10+i;

    if(d.type==='video'){
      el.style.height=Math.round(300*sc)+'px';
      var v=document.createElement('video');
      v.src=d.src;v.autoplay=true;v.muted=true;
      v.loop=true;v.playsInline=true;
      v.setAttribute('playsinline','');
      el.appendChild(v);
    }else{
      var img=document.createElement('img');
      img.src=d.src;
      img.alt=d.label;
      img.loading='lazy';
      el.appendChild(img);
    }

    var tg=document.createElement('div');
    tg.className='tg';
    tg.textContent=d.label;
    el.appendChild(tg);

    world.appendChild(el);

    var cardObj={el:el,x:x,y:y,w:w,h:Math.round(w*1.3),r:r,vx:0,vy:0,project:d.project,data:d};
    cards.push(cardObj);

    if(d.type==='img'){
      (function(c){
        var im=c.el.querySelector('img');
        if(im){
          im.onload=function(){
            var rect=c.el.getBoundingClientRect();
            if(rect.height>0) c.h=rect.height;
          };
        }
      })(cardObj);
    }
  });
}

/* CURSOR */
document.addEventListener('mousemove',function(e){
  cur.style.left=e.clientX+'px';
  cur.style.top=e.clientY+'px';
  clabel.style.left=e.clientX+'px';
  clabel.style.top=e.clientY+'px';
});

canvas.addEventListener('mouseover',function(e){
  var c=e.target.closest('.card');
  if(c){
    cur.classList.add('hover');
    clabel.textContent=DATA[c.getAttribute('data-idx')].label;
    clabel.classList.add('on');
  }else{
    cur.classList.remove('hover');
    clabel.classList.remove('on');
  }
});

canvas.addEventListener('mouseout',function(e){
  if(!e.target.closest('.card')){
    cur.classList.remove('hover');
    clabel.classList.remove('on');
  }
});

/* DRAG */
canvas.addEventListener('mousedown',function(e){
  var t=e.target.closest('.card');
  if(!t) return;
  e.preventDefault();
  var c=cards[t.getAttribute('data-idx')];
  dragC=c;
  c.el.classList.add('dr');
  cur.classList.add('drag');
  zTop++;c.el.style.zIndex=zTop;
  var rect=c.el.getBoundingClientRect();
  dragOff.x=e.clientX-rect.left;
  dragOff.y=e.clientY-rect.top;
  dragVel.x=0;dragVel.y=0;
  dragTime=Date.now();
  snd();
});

document.addEventListener('mousemove',function(e){
  if(!dragC) return;
  var now=Date.now();
  var dt=now-dragTime;
  var nx=(e.clientX-dragOff.x)/zoom;
  var ny=(e.clientY-dragOff.y)/zoom;
  if(dt>0){
    dragVel.x=(nx-dragC.x)/dt*16;
    dragVel.y=(ny-dragC.y)/dt*16;
  }
  dragC.x=nx;dragC.y=ny;
  dragC.el.style.left=nx+'px';
  dragC.el.style.top=ny+'px';
  dragTime=now;
});

document.addEventListener('mouseup',function(){
  if(!dragC) return;
  dragC.el.classList.remove('dr');
  cur.classList.remove('drag');
  dragC.vx=dragVel.x;dragC.vy=dragVel.y;
  dragC=null;
  snd();
});

/* PHYSICS */
function tick(){
  var W=window.innerWidth/zoom;
  var H=window.innerHeight/zoom;

  for(var i=0;i<cards.length;i++){
    var c=cards[i];
    if(c===dragC) continue;
    if(c.el.style.display==='none') continue;

    if(gravOn) c.vy+=0.6;

    if(Math.abs(c.vx)>0.08||Math.abs(c.vy)>0.08){
      c.x+=c.vx;c.y+=c.vy;
      c.vx*=0.94;c.vy*=0.94;

      if(c.x<0){c.x=0;c.vx=-c.vx*0.5;}
      if(c.x+c.w>W){c.x=W-c.w;c.vx=-c.vx*0.5;}
      if(c.y<0){c.y=0;c.vy=-c.vy*0.5;}
      if(c.y+c.h>H){c.y=H-c.h;c.vy=-c.vy*0.5;}

      c.el.style.left=c.x+'px';
      c.el.style.top=c.y+'px';
    }else{
      c.vx=0;c.vy=0;
    }
  }

  for(var i=0;i<cards.length;i++){
    var a=cards[i];
    if(a===dragC||a.el.style.display==='none') continue;
    for(var j=i+1;j<cards.length;j++){
      var b=cards[j];
      if(b===dragC||b.el.style.display==='none') continue;
      var acx=a.x+a.w/2,acy=a.y+a.h/2;
      var bcx=b.x+b.w/2,bcy=b.y+b.h/2;
      var ox=(a.w+b.w)/2-Math.abs(acx-bcx);
      var oy=(a.h+b.h)/2-Math.abs(acy-bcy);
      if(ox>0&&oy>0){
        if(ox<oy){
          var s=acx<bcx?-1:1;
          a.vx+=s*0.25;b.vx-=s*0.25;
        }else{
          var s=acy<bcy?-1:1;
          a.vy+=s*0.25;b.vy-=s*0.25;
        }
      }
    }
  }
  requestAnimationFrame(tick);
}
tick();/* DBLCLICK → DETAIL */
canvas.addEventListener('dblclick',function(e){
  var t=e.target.closest('.card');
  if(!t) return;
  openDetail(t.getAttribute('data-project'));
});

function openDetail(key){
  var info=INFO[key];
  if(!info) return;
  detail.className='open '+info.theme;

  dHero.innerHTML='<img class="dlogo" src="'+info.logo+'" alt="'+info.title+'" onerror="this.style.display=\'none\'">'+
    '<h1 class="dtitle">'+info.title+'</h1>'+
    '<div class="ddesc">'+info.desc+'</div>';

  var html='';
  info.vids.forEach(function(v){
    html+='<div class="gi"><video src="'+v+'" autoplay muted loop playsinline controls style="width:100%;display:block"></video></div>';
  });
  for(var i=1;i<=info.imgs;i++){
    html+='<div class="gi"><img src="'+ip(key,i)+'" alt="'+info.title+'" loading="lazy"></div>';
  }
  dGal.innerHTML=html;

  var imgs=dGal.querySelectorAll('img');
  for(var i=0;i<imgs.length;i++){
    imgs[i].addEventListener('click',function(){
      lbImg.src=this.src;
      lbImg.style.display='block';
      var v=lightbox.querySelector('video');
      if(v) v.style.display='none';
      lightbox.classList.add('open');
    });
  }

  detail.scrollTop=0;
  snd();
}

dCloseBtn.addEventListener('click',function(){
  detail.className='';
  var vids=dGal.querySelectorAll('video');
  for(var i=0;i<vids.length;i++) vids[i].pause();
});

lbCloseBtn.addEventListener('click',closeLB);
lightbox.addEventListener('click',function(e){if(e.target===lightbox) closeLB();});
function closeLB(){
  lightbox.classList.remove('open');
  lbImg.style.display='none';
  var v=lightbox.querySelector('video');
  if(v){v.pause();v.style.display='none';}
}

/* ZOOM */
canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  var d=e.deltaY>0?-0.04:0.04;
  zoom=Math.min(2.5,Math.max(0.3,zoom+d));
  world.style.transform='scale('+zoom+')';
},{passive:false});

/* GRAVITY */
document.addEventListener('keydown',function(e){
  if(e.code==='Space'&&!detail.classList.contains('open')){
    e.preventDefault();
    gravOn=!gravOn;
    if(gravOn){
      snd();
      cards.forEach(function(c){
        c.vx+=(Math.random()-0.5)*4;
        c.vy+=Math.random()*3;
      });
    }
  }
  if(e.code==='Escape'){
    if(lightbox.classList.contains('open')) closeLB();
    else if(detail.classList.contains('open')) detail.className='';
    gravOn=false;
  }
});

/* SHAKE DETECT */
var shPts=[];
var lastShake=0;
document.addEventListener('mousemove',function(e){
  var now=Date.now();
  shPts.push({x:e.clientX,y:e.clientY,t:now});
  while(shPts.length>0&&now-shPts[0].t>500) shPts.shift();
  if(shPts.length<6||now-lastShake<1200) return;
  var dist=0,dirs=0;
  for(var i=1;i<shPts.length;i++){
    var dx=shPts[i].x-shPts[i-1].x;
    var dy=shPts[i].y-shPts[i-1].y;
    dist+=Math.sqrt(dx*dx+dy*dy);
    if(i>1){
      var px=shPts[i-1].x-shPts[i-2].x;
      if((dx>0&&px<0)||(dx<0&&px>0)) dirs++;
    }
  }
  if(dist>400&&dirs>=3){lastShake=now;scatter();}
});

function scatter(){
  snd();
  gravOn=false;
  var W=window.innerWidth;
  var H=window.innerHeight;
  var pad=isMob?70:130;
  cards.forEach(function(c){
    if(c.el.style.display==='none') return;
    var nx=pad+Math.random()*Math.max(10,W-c.w-pad*2);
    var ny=pad+Math.random()*Math.max(10,H-c.h-pad*2);
    var nr=(Math.random()-0.5)*22;
    c.x=nx;c.y=ny;c.r=nr;c.vx=0;c.vy=0;
    c.el.style.transition='left .7s cubic-bezier(.25,.46,.45,.94),top .7s cubic-bezier(.25,.46,.45,.94),transform .7s cubic-bezier(.25,.46,.45,.94)';
    c.el.style.left=nx+'px';
    c.el.style.top=ny+'px';
    c.el.style.transform='rotate('+nr+'deg)';
    setTimeout(function(){c.el.style.transition='';},750);
  });
  setTimeout(snd,350);
}

/* TABS */
var tabs=document.querySelectorAll('.tb');
for(var t=0;t<tabs.length;t++){
  tabs[t].addEventListener('click',function(){
    var f=this.getAttribute('data-f');
    for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('on');
    this.classList.add('on');

    if(f==='all'){
      document.body.classList.remove('light-mode');
      cards.forEach(function(c){c.el.style.display='block';c.el.style.opacity='1';});
      scatter();
      return;
    }

    snd();

    /* Light/dark mode switch */
    if(f==='bp'){
      document.body.classList.add('light-mode');
    }else{
      document.body.classList.remove('light-mode');
    }

    var match=[];
    var rest=[];
    cards.forEach(function(c){
      if(c.project===f) match.push(c); else rest.push(c);
    });

    rest.forEach(function(c){
      c.el.style.transition='opacity .4s ease';
      c.el.style.opacity='0';
      setTimeout(function(){c.el.style.display='none';c.el.style.transition='';},400);
    });

    var W=window.innerWidth;
    var H=window.innerHeight;
    var cols=Math.ceil(Math.sqrt(match.length*1.3));
    var gap=isMob?8:14;
    var avgW=0,avgH=0;
    match.forEach(function(c){avgW+=c.w;avgH+=c.h;});
    avgW=avgW/match.length;
    avgH=avgH/match.length;
    var startX=Math.max(20,(W-cols*(avgW+gap))/2);
    var startY=Math.max(120,(H-Math.ceil(match.length/cols)*(avgH+gap))/2);

    match.forEach(function(c,i){
      var col=i%cols;
      var row=Math.floor(i/cols);
      var nx=startX+col*(avgW+gap)+(Math.random()-0.5)*6;
      var ny=startY+row*(avgH+gap)+(Math.random()-0.5)*6;
      var nr=(Math.random()-0.5)*4;
      c.el.style.display='block';
      c.el.style.transition='left .6s ease,top .6s ease,transform .6s ease,opacity .4s ease';
      c.el.style.opacity='1';
      c.el.style.left=nx+'px';
      c.el.style.top=ny+'px';
      c.el.style.transform='rotate('+nr+'deg)';
      c.x=nx;c.y=ny;c.r=nr;c.vx=0;c.vy=0;
      zTop++;c.el.style.zIndex=zTop;
      setTimeout(function(){c.el.style.transition='';},700);
    });
  });

  tabs[t].addEventListener('dblclick',function(){
    var f=this.getAttribute('data-f');
    if(f!=='all') openDetail(f);
  });
}

/* TOUCH */
var tCard=null;
var tOff={x:0,y:0};
var tLast=0;
var lastTap=0;

canvas.addEventListener('touchstart',function(e){
  if(e.touches.length>1) return;
  var touch=e.touches[0];
  var el=document.elementFromPoint(touch.clientX,touch.clientY);
  var card=el?el.closest('.card'):null;
  if(!card) return;
  var now=Date.now();
  if(now-lastTap<300){
    openDetail(card.getAttribute('data-project'));
    lastTap=0;e.preventDefault();return;
  }
  lastTap=now;
  tCard=cards[card.getAttribute('data-idx')];
  var rect=card.getBoundingClientRect();
  tOff.x=touch.clientX-rect.left;
  tOff.y=touch.clientY-rect.top;
  tLast=now;
  zTop++;tCard.el.style.zIndex=zTop;
  tCard.el.classList.add('dr');
  snd();e.preventDefault();
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  if(!tCard||e.touches.length>1) return;
  var touch=e.touches[0];
  var now=Date.now();
  var dt=now-tLast;
  var nx=(touch.clientX-tOff.x)/zoom;
  var ny=(touch.clientY-tOff.y)/zoom;
  if(dt>0){
    tCard.vx=(nx-tCard.x)/dt*16;
    tCard.vy=(ny-tCard.y)/dt*16;
  }
  tCard.x=nx;tCard.y=ny;
  tCard.el.style.left=nx+'px';
  tCard.el.style.top=ny+'px';
  tLast=now;e.preventDefault();
},{passive:false});

canvas.addEventListener('touchend',function(){
  if(!tCard) return;
  tCard.el.classList.remove('dr');
  tCard=null;snd();
});

/* PINCH */
var pinchD=0;
canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchD=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(pinchD>0){
      zoom=Math.min(2.5,Math.max(0.3,zoom*(d/pinchD)));
      world.style.transform='scale('+zoom+')';
    }
    pinchD=d;
  }
},{passive:true});
canvas.addEventListener('touchend',function(e){
  if(e.touches.length<2) pinchD=0;
},{passive:true});

/* MOBILE SHAKE */
if(isMob&&window.DeviceMotionEvent){
  var shLast=0;
  window.addEventListener('devicemotion',function(e){
    var a=e.accelerationIncludingGravity;
    if(!a) return;
    var f=Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z);
    var now=Date.now();
    if(f>30&&now-shLast>1500){shLast=now;scatter();}
  });
}

/* LOADING */
var lp=0;
var li=setInterval(function(){
  lp+=Math.random()*25;
  if(lp>100) lp=100;
  loadBar.style.width=lp+'%';
  if(lp>=100){
    clearInterval(li);
    setTimeout(function(){
      loadingEl.classList.add('done');
      setTimeout(function(){loadingEl.style.display='none';},800);
    },300);
  }
},200);

/* INIT */
build();
setTimeout(scatter,1200);

var rTimer;
window.addEventListener('resize',function(){
  clearTimeout(rTimer);
  rTimer=setTimeout(function(){build();setTimeout(scatter,100);},300);
});
</script>
</body>
</html>
